# nginx Reverse Proxy Configuration (HTTPS)
#
# Rendered from a template at container start: envsubst fills ${HTTPS_PORT},
# ${BACKEND_PORT} and ${FRONTEND_PORT} from the environment (see compose).
# All external traffic enters through HTTPS_PORT on the host (mapped to 443).
# /api/*       → backend
# /socket.io/* → backend (WebSocket upgrade)
# /*           → frontend

upstream backend {
    server backend_prod:${BACKEND_PORT};
}

upstream frontend {
    server frontend_prod:${FRONTEND_PORT};
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    # External HTTPS entrypoint is mapped to host port HTTPS_PORT (not 443).
    return 301 https://$host:${HTTPS_PORT}$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/conf/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/conf/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Upload size limit ─────────────────────────────────────
    client_max_body_size 15m;
    # Buffer up to 2 MB of a request body in memory before spilling to disk.
    # Default is 8–16 KB, which causes nginx to buffer file uploads to a
    # temp file and log a warning for every upload request.
    client_body_buffer_size 2m;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json
               application/xml+rss;

    # ── Security headers ──────────────────────────────────────
    # These four headers are authoritative here; proxy_hide_header below
    # strips the same headers from upstream (Helmet) responses so clients
    # never receive duplicates. X-XSS-Protection is intentionally omitted:
    # the browser XSS auditor is deprecated — Helmet correctly sets it to 0.
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy     "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content-Security-Policy.
    # 'unsafe-inline' on style-src is required by Vue's <style scoped> output
    # and most third-party UI; tighten with nonces once the inline-style audit
    # is done. img-src includes data: + blob: for avatar previews and Three.js
    # texture loads. connect-src 'self' + wss: covers REST and Socket.IO.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://avatars.githubusercontent.com https://*.googleusercontent.com https://*.githubusercontent.com; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' blob: wss: https:; object-src 'none'; form-action 'self'" always;

    # Strip matching headers from all upstream responses so nginx's
    # add_header directives above are the single source of truth.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Permissions-Policy;
    proxy_hide_header Content-Security-Policy;

    # ── Backend TLS verification ──────────────────────────────
    # The backend uses the same self-signed cert copied at build time.
    # Trust it explicitly instead of disabling verification entirely.
    proxy_ssl_verify              on;
    proxy_ssl_trusted_certificate /etc/nginx/conf/ssl/cert.pem;
    proxy_ssl_session_reuse       on;

    # ── API proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         https://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # REST calls should shed stuck connections quickly. The helpdesk SSE
        # stream is the slow path; bump it via /api/helpdesk/ below.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Help-desk SSE stream — LLM responses can take 30–60s; allow up to 5min.
    location /api/helpdesk/ {
        proxy_pass         https://backend/api/helpdesk/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket proxy (Socket.io) ──────────────────────────
    location /socket.io/ {
        proxy_pass         https://backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $http_host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── Uploaded files ─────────────────────────────────────────
    location /uploads/ {
        proxy_pass         https://backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA / Frontend ───────────────────────────────────────
    location / {
        proxy_pass         https://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
