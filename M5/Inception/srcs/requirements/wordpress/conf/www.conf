[www]
user = nobody
group = nobody
listen = 0.0.0.0:9000
listen.owner = nobody
listen.group = nobody
listen.mode = 0660
pm = dynamic
pm.max_children = 20
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 1000
clear_env = no
catch_workers_output = yes
access.log = /var/log/php83/access.log
php_admin_value[error_log] = /var/log/php83/error.log
php_admin_flag[log_errors] = on
