# Events block configures the worker processes and connection handling
events {
    worker_connections 1024;    # Maximum number of simultaneous connections per worker process
                               # Higher values allow more concurrent users but use more memory
}

# HTTP block contains all web server configuration
http {
    include       /etc/nginx/mime.types;     # Load MIME type definitions for file extensions
    default_type  application/octet-stream;  # Default MIME type for unknown files (binary download)
    
    sendfile on;                # Use kernel sendfile() for efficient file transfers (faster than read/write)
    tcp_nopush on;             # Send headers and file content in one packet (reduces network overhead)
    tcp_nodelay on;            # Don't buffer small packets (reduces latency for small responses)
    keepalive_timeout 65;      # Keep connections alive for 65 seconds (reduces connection overhead)
    client_max_body_size 100M; # Maximum upload size (allows large WordPress media uploads)
    
    # Security headers applied to all responses
    add_header X-Frame-Options DENY;                           # Prevent page from being embedded in frames (clickjacking protection)
    add_header X-Content-Type-Options nosniff;                 # Prevent MIME type sniffing attacks
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # Force HTTPS for 1 year on all subdomains
    
    # HTTP server block - redirect all HTTP to HTTPS
    server {
        listen 80;                         # Listen on port 80 (HTTP)
        server_name DOMAIN_NAME_PLACEHOLDER;  # Domain name (replaced by setup script)
        
        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }
    
    # HTTPS server block - main configuration
    server {
        listen 443 ssl;                    # Listen on port 443 with SSL
        http2 on;                          # Enable HTTP/2
        server_name DOMAIN_NAME_PLACEHOLDER;  # Domain name (replaced by setup script)
        
        root /var/www/html;                 # Document root where WordPress files are located
        index index.php index.html index.htm;  # Try these files in order when directory is requested
        
        # Enhanced SSL Configuration for better security and browser compatibility
        ssl_certificate /etc/ssl/certs/nginx.crt;      # Path to SSL certificate file
        ssl_certificate_key /etc/ssl/private/nginx.key; # Path to SSL private key file
        ssl_protocols TLSv1.2 TLSv1.3;                 # Only allow secure TLS versions (required by subject)
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;                  # Let client choose preferred cipher (modern approach)
        ssl_session_cache shared:SSL:10m;               # Cache SSL sessions for 10MB (improves performance)
        ssl_session_timeout 1d;                        # SSL sessions expire after 1 day
        ssl_session_tickets off;                       # Disable session tickets for better security
        
        # Logging configuration for debugging and monitoring
        access_log /var/log/nginx/access.log;   # Log all requests for monitoring and debugging
        error_log /var/log/nginx/error.log warn; # Log warnings and errors for troubleshooting
        
        # WordPress specific configurations
        location / {
            try_files $uri $uri/ /index.php?$args;  # Try file, then directory, then WordPress routing
        }
        
        # PHP files processing - main handler for all PHP requests
        location ~ \.php$ {
            include fastcgi_params;                      # Load FastCGI parameters
            fastcgi_pass wordpress:9000;                 # Forward to WordPress container on port 9000
            fastcgi_index index.php;                     # Default file for directory requests
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;  # Full path to PHP script
            fastcgi_param HTTPS on;                      # Tell PHP that HTTPS is being used
            fastcgi_param HTTP_SCHEME https;             # Set scheme to HTTPS for WordPress
            fastcgi_param SERVER_PORT 443;               # Tell PHP we're on HTTPS port
            fastcgi_read_timeout 300;                    # Allow up to 5 minutes for long-running scripts
            fastcgi_buffer_size 128k;                    # Buffer size for FastCGI responses
            fastcgi_buffers 4 256k;                      # Number and size of buffers
            fastcgi_busy_buffers_size 256k;              # Size of busy buffers
        }
        
    }
}
